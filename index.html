"d5b7b051-60d4-460c-9c33-83a21a6a8f46\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --cream:#F4EFE5;\n    --paper:#FBF7EF;\n    --paper-card:#FFFDF8;\n    --teal-900:#0E3C3F;\n    --teal-800:#124A4D;\n    --teal-700:#185A5C;\n    --teal-500:#2E7C77;\n    --teal-wash:rgba(24,90,92,0.08);\n    --clay:#BE805C;\n    --clay-soft:#D8A07C;\n    --clay-tint:rgba(190,128,92,0.14);\n    --ink:#26221B;\n    --muted:#6A6357;\n    --rule:#E3DBCB;\n    --shadow-sm:0 1px 2px rgba(20,40,40,.04), 0 10px 28px rgba(20,40,40,.05);\n    --shadow-md:0 4px 14px rgba(20,40,40,.06), 0 22px 54px rgba(20,40,40,.09);\n    --ease:cubic-bezier(0.2,0.6,0.2,1);\n  }\n  *{box-sizing:border-box;}\n  html{scroll-behavior:smooth;}\n  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Mulish',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:18px;line-height:1.65;}\n  ::selection{background:var(--clay-tint);}\n  @keyframes breathe{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.12);opacity:.78;}}\n  @keyframes breatheSoft{0%,100%{transform:scale(1.04);opacity:.4;}50%{transform:scale(0.94);opacity:.62;}}\n  :focus-visible{outline:3px solid rgba(24,90,92,.5);outline-offset:3px;border-radius:6px;}\n  @media (prefers-reduced-motion: reduce){\n    html{scroll-behavior:auto;}\n    .breathe-glow{animation:none !important;}\n  }\n  @media (max-width:880px){\n    .hero-grid{grid-template-columns:1fr !important;}\n    .book-grid{grid-template-columns:1fr !important;}\n    .nav-link{display:none !important;}\n  }\n  @media (max-width:880px){\n    .gains-grid{grid-template-columns:repeat(2,1fr) !important;}\n  }\n  @media (max-width:640px){\n    .footer-grid{grid-template-columns:1fr !important;gap:32px !important;}\n    .gains-grid{grid-template-columns:1fr !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ setRoot }}\" style=\"position:relative;overflow-x:clip;background:var(--cream);\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"position:relative;z-index:5;max-width:1240px;margin:0 auto;padding:26px clamp(20px,5vw,80px);display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n    <a href=\"#top\" style=\"text-decoration:none;color:var(--ink);display:flex;flex-direction:column;line-height:1.2;\">\n      <span style=\"font-family:'Cormorant Upright',serif;font-size:23px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;\">Soniyaa Kiran Punjabi<\u002Fspan>\n      <span style=\"font-size:11.5px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-top:3px;\">Hypnotherapy &amp; self-hypnosis<\u002Fspan>\n    <\u002Fa>\n    <nav style=\"display:flex;align-items:center;gap:clamp(14px,2.4vw,34px);\">\n      <a href=\"#approach\" style=\"text-decoration:none;color:var(--muted);font-size:15px;font-weight:500;\" class=\"nav-link\">Approach<\u002Fa>\n      <a href=\"#paths\" style=\"text-decoration:none;color:var(--muted);font-size:15px;font-weight:500;\" class=\"nav-link\">The two paths<\u002Fa>\n      <a href=\"#gains\" style=\"text-decoration:none;color:var(--muted);font-size:15px;font-weight:500;\" class=\"nav-link\">What you'll gain<\u002Fa>\n      <a href=\"#book\" style=\"text-decoration:none;background:var(--teal-700);color:#FCF8F0;font-size:15px;font-weight:500;padding:11px 22px;border-radius:999px;white-space:nowrap;transition:background .2s var(--ease);\" style-hover=\"background:var(--teal-900);\">Book a session<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section id=\"top\" style=\"position:relative;max-width:1240px;margin:0 auto;padding:clamp(28px,5vw,64px) clamp(20px,5vw,80px) clamp(64px,9vw,120px);\">\n    <div style=\"display:grid;grid-template-columns:1.02fr 0.98fr;gap:clamp(36px,6vw,84px);align-items:center;\" class=\"hero-grid\">\n\n      <div style=\"max-width:600px;position:relative;z-index:2;min-width:0;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;font-size:12.5px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-bottom:30px;\">\n          <span style=\"width:26px;height:1px;background:var(--clay);display:inline-block;\"><\u002Fspan>\n          Illuminations · Dubai\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(46px,6.4vw,84px);line-height:0.98;letter-spacing:-.01em;margin:0 0 50px;color:var(--ink);text-wrap:pretty;width:min(720px,90vw);position:relative;\">\n          Come back to <em style=\"font-style: italic; color: var(--teal-700);\">calm<\u002Fem> and<br>learn the way back<br>on your own.\n        <\u002Fh1>\n        <p style=\"font-size:clamp(17px,1.4vw,20px);line-height:1.65;color:var(--muted);margin:0 0 38px;max-width:33em;\">\n          Hypnotherapy and self-hypnosis grounded in how your nervous system actually works. Soft, practical, and paced to you - in group classes and private sessions in Dubai.\n        <\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:16px;\">\n          <a href=\"#book\" style=\"display:inline-flex;align-items:center;gap:10px;background:var(--teal-700);color:#FCF8F0;font-size:16.5px;font-weight:500;padding:16px 30px;border-radius:999px;text-decoration:none;box-shadow:var(--shadow-sm);transition:background .2s var(--ease),transform .2s var(--ease);\" style-hover=\"background:var(--teal-900);transform:translateY(-1px);\">\n            Book your session\n            <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fa>\n          <a href=\"#paths\" style=\"display:inline-flex;align-items:center;gap:9px;color:var(--ink);font-size:16.5px;font-weight:500;padding:15px 8px;border-bottom:1.5px solid var(--clay);text-decoration:none;transition:color .2s var(--ease);\" style-hover=\"color:var(--teal-700);\">\n            Explore the two paths\n          <\u002Fa>\n        <\u002Fdiv>\n        <p style=\"margin:34px 0 0;font-size:14.5px;color:var(--muted);\">For stress, sleep, focus, confidence - and releasing patterns you've outgrown.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"position:relative;display:flex;justify-content:center;align-items:center;\">\n        <div class=\"breathe-glow\" style=\"position:absolute;width:118%;height:108%;left:-9%;top:-4%;z-index:0;border-radius:50%;filter:blur(58px);background:radial-gradient(40% 46% at 32% 30%, rgba(46,124,119,.55), transparent 70%), radial-gradient(44% 48% at 74% 78%, rgba(216,160,124,.5), transparent 72%);animation:breathe 8s ease-in-out infinite;\"><\u002Fdiv>\n        <div data-reveal-hero=\"\" style=\"position:relative;z-index:1;width:min(440px,86vw);\">\n          <div style=\"position:relative;border-radius:230px 230px 26px 26px;overflow:hidden;box-shadow:var(--shadow-md);border:1px solid rgba(255,255,255,.6);aspect-ratio:1107/1480;background:var(--teal-wash);\">\n            <img src=\"ab56dfd5-4475-4e09-8786-94df3be64a99\" alt=\"Soniyaa Kiran Punjabi, hypnotherapist, smiling\" style=\"width:100%;height:100%;object-fit:cover;object-position:50% 18%;display:block;\">\n          <\u002Fdiv>\n          <div style=\"position:absolute;left:-6%;bottom:34px;background:var(--paper-card);border:1px solid var(--rule);border-radius:16px;padding:14px 20px;box-shadow:var(--shadow-md);\">\n            <div style=\"font-family:'Cormorant Upright',serif;font-size:18px;font-weight:500;color:var(--ink);line-height:1.2;\">Soniyaa Kiran Punjabi<\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-top:4px;\">Hypnotherapist · Illuminations<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ APPROACH ============ -->\n  <section id=\"approach\" style=\"position:relative;background:var(--paper);border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,10vw,128px) clamp(20px,5vw,80px);\">\n      <div data-reveal=\"\" style=\"max-width:780px;margin-bottom:clamp(48px,6vw,72px);\">\n        <div style=\"font-size:12.5px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-bottom:22px;\">The approach<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(34px,4.6vw,58px);line-height:1.05;letter-spacing:-.01em;margin:0 0 24px;color:var(--ink);text-wrap:balance;\">\n          The work is with your nervous system, not your willpower.\n        <\u002Fh2>\n        <p style=\"font-size:clamp(17px,1.4vw,19px);color:var(--muted);margin:0;max-width:60ch;\">\n          Most stress isn't a thinking problem. It's a body that learned to stay on high alert and never quite stood down. You can't reason your way out of that - but you can teach your system that it's safe to soften. That's what we practise together, step by step.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:20px;\">\n\n        <div data-reveal=\"\" style=\"background:var(--paper-card);border:1px solid var(--rule);border-radius:18px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease);\" style-hover=\"box-shadow:var(--shadow-md);transform:translateY(-3px);\">\n          <div style=\"width:46px;height:46px;border-radius:13px;background:var(--teal-wash);color:var(--teal-700);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"23\" height=\"23\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 2 2 7l10 5 10-5-10-5Z\"><\u002Fpath><path d=\"M2 17l10 5 10-5\"><\u002Fpath><path d=\"M2 12l10 5 10-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:22px;margin:0 0 10px;color:var(--ink);\">Three brains, one in charge<\u002Fh3>\n          <p style=\"font-size:15.5px;color:var(--muted);margin:0;line-height:1.6;\">Survival, emotional, thinking. Under stress the survival brain grabs the wheel and locks you in fight, flight or freeze. We start by noticing who's driving.<\u002Fp>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:var(--paper-card);border:1px solid var(--rule);border-radius:18px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease);\" style-hover=\"box-shadow:var(--shadow-md);transform:translateY(-3px);\">\n          <div style=\"width:46px;height:46px;border-radius:13px;background:var(--teal-wash);color:var(--teal-700);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"23\" height=\"23\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:22px;margin:0 0 10px;color:var(--ink);\">From overdrive to rest<\u002Fh3>\n          <p style=\"font-size:15.5px;color:var(--muted);margin:0;line-height:1.6;\">Your autonomic nervous system has two gears. We learn to move out of sympathetic overdrive and into the parasympathetic state where you rest, digest and repair.<\u002Fp>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:var(--paper-card);border:1px solid var(--rule);border-radius:18px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease);\" style-hover=\"box-shadow:var(--shadow-md);transform:translateY(-3px);\">\n          <div style=\"width:46px;height:46px;border-radius:13px;background:var(--teal-wash);color:var(--teal-700);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"23\" height=\"23\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:22px;margin:0 0 10px;color:var(--ink);\">Naming the responses<\u002Fh3>\n          <p style=\"font-size:15.5px;color:var(--muted);margin:0;line-height:1.6;\">Fight, flight, freeze, fawn, flop - each is your body trying to keep you safe. Once you can recognise yours, you can meet it with a way to settle instead of fighting it.<\u002Fp>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:var(--paper-card);border:1px solid var(--rule);border-radius:18px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease);\" style-hover=\"box-shadow:var(--shadow-md);transform:translateY(-3px);\">\n          <div style=\"width:46px;height:46px;border-radius:13px;background:var(--clay-tint);color:var(--clay);display:flex;align-items:center;justify-content:center;margin-bottom:22px;\">\n            <svg viewBox=\"0 0 24 24\" width=\"23\" height=\"23\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M17 2l4 4-4 4\"><\u002Fpath><path d=\"M3 11v-1a4 4 0 0 1 4-4h14\"><\u002Fpath><path d=\"M7 22l-4-4 4-4\"><\u002Fpath><path d=\"M21 13v1a4 4 0 0 1-4 4H3\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:22px;margin:0 0 10px;color:var(--ink);\">A practice you keep<\u002Fh3>\n          <p style=\"font-size:15.5px;color:var(--muted);margin:0;line-height:1.6;\">Self-hypnosis is a daily self-regulation tool: keyword anchoring, the laws of repetition and association, and a simple 21-day cycle that makes calm a habit rather than a hope.<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TWO PATHS ============ -->\n  <section id=\"paths\" style=\"position:relative;max-width:1240px;margin:0 auto;padding:clamp(72px,10vw,128px) clamp(20px,5vw,80px);\">\n    <div data-reveal=\"\" style=\"max-width:680px;margin-bottom:clamp(44px,6vw,64px);\">\n      <div style=\"font-size:12.5px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-bottom:22px;\">Two ways to begin<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(34px,4.6vw,58px);line-height:1.05;letter-spacing:-.01em;margin:0 0 20px;color:var(--ink);text-wrap:balance;\">Learn it in a group, or work one to one.<\u002Fh2>\n      <p style=\"font-size:clamp(17px,1.4vw,19px);color:var(--muted);margin:0;max-width:56ch;\">Both lead to the same place - a calmer, more regulated you. Choose the pace and the company that fit your life right now.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;\">\n\n      <!-- Group -->\n      <div data-reveal=\"\" style=\"display:flex;flex-direction:column;background:var(--paper-card);border:1px solid var(--rule);border-radius:22px;padding:clamp(30px,3.5vw,44px);box-shadow:var(--shadow-sm);\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:14px;background:var(--teal-wash);color:var(--teal-700);display:flex;align-items:center;justify-content:center;\">\n            <svg viewBox=\"0 0 24 24\" width=\"25\" height=\"25\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 21v-2a4 4 0 0 0-3-3.87\"><\u002Fpath><path d=\"M16 3.13a4 4 0 0 1 0 7.75\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <span style=\"font-family:'Cormorant Upright',serif;font-style:italic;font-size:18px;color:var(--muted);\">01<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:clamp(24px,2.6vw,30px);margin:0 0 12px;color:var(--ink);\">Group classes<\u002Fh3>\n        <p style=\"font-size:16px;color:var(--muted);margin:0 0 26px;line-height:1.6;\">A complete training path in self-hypnosis and hypnotherapy - from your first grounding techniques to a confident daily practice. Learn how your nervous system works, in the warmth of a small group.<\u002Fp>\n\n        <div style=\"display:flex;flex-direction:column;gap:1px;background:var(--rule);border-radius:14px;overflow:hidden;border:1px solid var(--rule);margin-bottom:26px;\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start;padding:15px 18px;background:var(--paper);\">\n            <span style=\"font-family:'Cormorant Upright',serif;font-style:italic;color:var(--teal-500);font-size:16px;line-height:1.5;flex:none;\">I<\u002Fspan>\n            <div><div style=\"font-weight:500;font-size:15px;color:var(--ink);\">Foundations<\u002Fdiv><div style=\"font-size:14px;color:var(--muted);\">Understand your nervous system and learn to settle it.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;padding:15px 18px;background:var(--paper);\">\n            <span style=\"font-family:'Cormorant Upright',serif;font-style:italic;color:var(--teal-500);font-size:16px;line-height:1.5;flex:none;\">II<\u002Fspan>\n            <div><div style=\"font-weight:500;font-size:15px;color:var(--ink);\">Practice<\u002Fdiv><div style=\"font-size:14px;color:var(--muted);\">Build self-hypnosis into a daily 21-day rhythm.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;padding:15px 18px;background:var(--paper);\">\n            <span style=\"font-family:'Cormorant Upright',serif;font-style:italic;color:var(--teal-500);font-size:16px;line-height:1.5;flex:none;\">III<\u002Fspan>\n            <div><div style=\"font-weight:500;font-size:15px;color:var(--ink);\">Deepening<\u002Fdiv><div style=\"font-size:14px;color:var(--muted);\">Refine your practice and carry it into everyday life.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:9px;font-size:14px;color:var(--teal-700);font-weight:500;margin-bottom:28px;\">\n          <svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          Open to everyone - start wherever you are, no experience needed.\n        <\u002Fdiv>\n\n        <a href=\"#book\" style=\"margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--teal-700);color:#FCF8F0;font-size:16px;font-weight:500;padding:15px 26px;border-radius:999px;text-decoration:none;transition:background .2s var(--ease);\" style-hover=\"background:var(--teal-900);\">\n          Join the group journey\n          <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- Private -->\n      <div data-reveal=\"\" style=\"display:flex;flex-direction:column;background:var(--teal-900);border:1px solid var(--teal-900);border-radius:22px;padding:clamp(30px,3.5vw,44px);box-shadow:var(--shadow-md);color:#EAEDE8;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;\">\n          <div style=\"width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.1);color:var(--clay-soft);display:flex;align-items:center;justify-content:center;\">\n            <svg viewBox=\"0 0 24 24\" width=\"25\" height=\"25\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n          <\u002Fdiv>\n          <span style=\"font-family:'Cormorant Upright',serif;font-style:italic;font-size:18px;color:rgba(234,237,232,.6);\">02<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:clamp(24px,2.6vw,30px);margin:0 0 12px;color:#FBF8F1;\">Private 1:1 sessions<\u002Fh3>\n        <p style=\"font-size:16px;color:rgba(234,237,232,.78);margin:0 0 26px;line-height:1.6;\">Personalised hypnotherapy for one specific goal, tailored and paced entirely to you. We work quietly and directly, with everything shaped around where you are and where you'd like to be.<\u002Fp>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:30px;\">\n          <span style=\"font-size:14px;font-weight:500;color:#EAEDE8;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);padding:8px 15px;border-radius:999px;\">Anxiety &amp; stress<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:500;color:#EAEDE8;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);padding:8px 15px;border-radius:999px;\">Better sleep<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:500;color:#EAEDE8;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);padding:8px 15px;border-radius:999px;\">Confidence<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:500;color:#EAEDE8;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);padding:8px 15px;border-radius:999px;\">Releasing old patterns<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;gap:9px;font-size:14px;color:var(--clay-soft);font-weight:500;margin-bottom:28px;\">\n          <svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n          Entirely confidential, and paced to you.\n        <\u002Fdiv>\n\n        <a href=\"#book\" style=\"margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#FBF8F1;color:var(--teal-900);font-size:16px;font-weight:500;padding:15px 26px;border-radius:999px;text-decoration:none;transition:background .2s var(--ease);\" style-hover=\"background:var(--clay-soft);\">\n          Book a private session\n          <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHAT YOU'LL GAIN (dark band) ============ -->\n  <section id=\"gains\" style=\"position:relative;background:var(--teal-800);color:#EAEDE8;overflow:hidden;\">\n    <div class=\"breathe-glow\" style=\"position:absolute;width:600px;height:600px;right:-160px;top:-220px;border-radius:50%;filter:blur(80px);background:radial-gradient(circle, rgba(216,160,124,.32), transparent 68%);animation:breatheSoft 11s ease-in-out infinite;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1240px;margin:0 auto;padding:clamp(72px,10vw,128px) clamp(20px,5vw,80px);\">\n      <div data-reveal=\"\" style=\"max-width:680px;margin-bottom:clamp(48px,6vw,66px);\">\n        <div style=\"font-size:12.5px;font-weight:500;letter-spacing:.04em;color:var(--clay-soft);margin-bottom:22px;\">What you'll gain<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(34px,4.6vw,58px);line-height:1.05;letter-spacing:-.01em;margin:0;color:#FBF8F1;text-wrap:balance;\">Not a quick fix. A quieter baseline you can return to.<\u002Fh2>\n      <\u002Fdiv>\n\n      <div class=\"gains-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden;\">\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12.8 19.6A2 2 0 1 0 14 16H2\"><\u002Fpath><path d=\"M17.5 8a2.5 2.5 0 1 1 1.8 4.2H2\"><\u002Fpath><path d=\"M9.8 4.4A2 2 0 1 1 11 8H2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Lower daily stress<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">A body that settles faster, instead of running hot all day.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.49 4.04 3 5.5l7 7Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Calmer emotions<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">Space between what happens and how you respond to it.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Deeper sleep<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">Falling asleep more easily, and waking up more rested.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"6\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Sharper focus<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">A mind that's present, instead of scattered across everything.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Steadier confidence<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">Trust in yourself that comes from feeling safe inside.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:var(--teal-800);padding:30px 28px;\">\n          <div style=\"color:var(--clay-soft);margin-bottom:18px;\"><svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 9.9-1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:21px;margin:0 0 8px;color:#FBF8F1;\">Freedom from old patterns<\u002Fh3>\n          <p style=\"font-size:15px;color:rgba(234,237,232,.72);margin:0;line-height:1.55;\">Letting go of the loops that no longer serve you.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SAFETY NOTE ============ -->\n  <section style=\"position:relative;max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) clamp(20px,5vw,80px);\">\n    <div data-reveal=\"\" style=\"max-width:600px;margin:0 auto;display:flex;flex-direction:column;align-items:center;text-align:center;\">\n      <div style=\"width:48px;height:48px;border-radius:50%;background:var(--clay-tint);color:var(--clay);display:flex;align-items:center;justify-content:center;margin-bottom:24px;\">\n        <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4\"><\u002Fpath><path d=\"M12 8h.01\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(26px,3.4vw,38px);line-height:1.08;letter-spacing:-.01em;margin:0 0 16px;color:var(--ink);\">A gentle, honest note<\u002Fh3>\n      <p style=\"font-size:17px;color:var(--muted);margin:0;line-height:1.7;max-width:54ch;\">Self-hypnosis is a tool for self-regulation and everyday calm, and it works beautifully alongside professional care. It isn't a replacement for therapy or medical treatment for deep-seated or clinical concerns. If something runs deep, we'll talk openly about the right support for you - there's no pressure here, ever.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BOOKING ============ -->\n  <section id=\"book\" style=\"position:relative;background:var(--paper);border-top:1px solid var(--rule);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,10vw,128px) clamp(20px,5vw,80px);\">\n      <div style=\"display:grid;grid-template-columns:0.92fr 1.08fr;gap:clamp(40px,6vw,80px);align-items:start;\" class=\"book-grid\">\n\n        <div data-reveal=\"\">\n          <div style=\"font-size:12.5px;font-weight:500;letter-spacing:.04em;color:var(--teal-500);margin-bottom:22px;\">Book a session<\u002Fdiv>\n          <h2 style=\"font-family:'Cormorant Upright',serif;font-weight:600;font-size:clamp(34px,4.6vw,58px);line-height:1.05;letter-spacing:-.01em;margin:0 0 22px;color:var(--ink);text-wrap:balance;\">Let's find your way back to calm.<\u002Fh2>\n          <p style=\"font-size:clamp(16px,1.3vw,18px);color:var(--muted);margin:0 0 30px;max-width:42ch;\">Tell me a little about what you're looking for. I'll be in touch personally - usually within a day - to find a time that suits you.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:16px;\">\n            <div style=\"display:flex;gap:13px;align-items:center;color:var(--ink);font-size:15.5px;\">\n              <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" fill=\"none\" stroke=\"var(--teal-700)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              No commitment - this is just the first conversation.\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;align-items:center;color:var(--ink);font-size:15.5px;\">\n              <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" fill=\"none\" stroke=\"var(--teal-700)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              Group and private sessions, in person at Illuminations.\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:13px;align-items:center;color:var(--ink);font-size:15.5px;\">\n              <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" fill=\"none\" stroke=\"var(--teal-700)\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              Everything you share stays completely confidential.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-reveal=\"\" style=\"background:var(--paper-card);border:1px solid var(--rule);border-radius:22px;padding:clamp(26px,3.2vw,40px);box-shadow:var(--shadow-md);\">\n\n          <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" novalidate=\"{{ true }}\" style=\"display:flex;flex-direction:column;gap:22px;\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <label for=\"f-name\" style=\"font-size:14px;font-weight:500;color:var(--ink);\">Your name<\u002Flabel>\n              <input id=\"f-name\" name=\"name\" type=\"text\" required=\"{{ true }}\" autocomplete=\"name\" placeholder=\"First and last name\" style=\"font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;outline:none;transition:border-color .2s var(--ease),box-shadow .2s var(--ease);\" style-focus=\"border-color:var(--teal-500);box-shadow:0 0 0 4px var(--teal-wash);\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <label for=\"f-email\" style=\"font-size:14px;font-weight:500;color:var(--ink);\">Email<\u002Flabel>\n              <input id=\"f-email\" name=\"email\" type=\"email\" required=\"{{ true }}\" autocomplete=\"email\" placeholder=\"ex. email@gmail.com\" style=\"font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;outline:none;transition:border-color .2s var(--ease),box-shadow .2s var(--ease);\" style-focus=\"border-color:var(--teal-500);box-shadow:0 0 0 4px var(--teal-wash);\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px;\">\n              <span style=\"font-size:14px;font-weight:500;color:var(--ink);\">Which path feels right?<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <label style=\"display:flex;align-items:center;gap:13px;border:1px solid var(--rule);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:15.5px;color:var(--ink);background:var(--paper);transition:border-color .2s var(--ease);\" style-hover=\"border-color:var(--teal-500);\">\n                  <input type=\"radio\" name=\"path\" value=\"group\" required=\"{{ true }}\" style=\"accent-color:var(--teal-700);width:18px;height:18px;flex:none;\">\n                  Group classes - learn self-hypnosis step by step\n                <\u002Flabel>\n                <label style=\"display:flex;align-items:center;gap:13px;border:1px solid var(--rule);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:15.5px;color:var(--ink);background:var(--paper);transition:border-color .2s var(--ease);\" style-hover=\"border-color:var(--teal-500);\">\n                  <input type=\"radio\" name=\"path\" value=\"private\" style=\"accent-color:var(--teal-700);width:18px;height:18px;flex:none;\">\n                  Private 1:1 - personalised hypnotherapy\n                <\u002Flabel>\n                <label style=\"display:flex;align-items:center;gap:13px;border:1px solid var(--rule);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:15.5px;color:var(--ink);background:var(--paper);transition:border-color .2s var(--ease);\" style-hover=\"border-color:var(--teal-500);\">\n                  <input type=\"radio\" name=\"path\" value=\"unsure\" style=\"accent-color:var(--teal-700);width:18px;height:18px;flex:none;\">\n                  Not sure yet - help me choose\n                <\u002Flabel>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <label for=\"f-note\" style=\"font-size:14px;font-weight:500;color:var(--ink);\">Anything you'd like me to know <span style=\"font-weight:400;color:var(--muted);\">(optional)<\u002Fspan><\u002Flabel>\n              <textarea id=\"f-note\" name=\"note\" rows=\"3\" placeholder=\"What's bringing you here right now?\" style=\"font-family:inherit;font-size:16px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;outline:none;resize:vertical;transition:border-color .2s var(--ease),box-shadow .2s var(--ease);\" style-focus=\"border-color:var(--teal-500);box-shadow:0 0 0 4px var(--teal-wash);\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <button type=\"submit\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:10px;background:var(--teal-700);color:#FCF8F0;font-family:inherit;font-size:16.5px;font-weight:500;padding:16px 28px;border:none;border-radius:999px;cursor:pointer;transition:background .2s var(--ease);\" style-hover=\"background:var(--teal-900);\">\n              Book your session\n              <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <p style=\"font-size:13px;color:var(--muted);margin:0;text-align:center;\">By sending this you agree to be contacted about your session. No newsletters, no sharing.<\u002Fp>\n          <\u002Fform>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ submitted }}\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 4px;\">\n            <div style=\"width:64px;height:64px;border-radius:50%;background:var(--teal-wash);color:var(--teal-700);display:flex;align-items:center;justify-content:center;margin-bottom:24px;\">\n              <svg viewBox=\"0 0 24 24\" width=\"30\" height=\"30\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Cormorant Upright',serif;font-weight:500;font-size:30px;margin:0 0 12px;color:var(--ink);\">{{ greeting }}<\u002Fh3>\n            <p style=\"font-size:17px;color:var(--muted);margin:0 0 28px;max-width:34ch;line-height:1.6;\">Your request is in. I'll be in touch personally - usually within a day - to find a time that works for you. Take a slow breath; you've already started.<\u002Fp>\n            <a href=\"#top\" style=\"display:inline-flex;align-items:center;gap:9px;color:var(--teal-700);font-size:15.5px;font-weight:500;text-decoration:none;border-bottom:1.5px solid var(--clay);padding-bottom:3px;\">Back to the top<\u002Fa>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:var(--teal-900);color:#D9DEDA;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(56px,7vw,88px) clamp(20px,5vw,80px) 44px;\">\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:40px;\" class=\"footer-grid\">\n        <div>\n          <div style=\"font-family:'Cormorant Upright',serif;font-size:24px;font-weight:500;color:#FBF8F1;margin-bottom:12px;\">Soniyaa Kiran Punjabi<\u002Fdiv>\n          <p style=\"font-size:15px;color:rgba(217,222,218,.72);margin:0;max-width:34ch;line-height:1.6;\">Hypnotherapy and self-hypnosis for a calmer, more regulated everyday life.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px;font-weight:500;letter-spacing:.04em;color:var(--clay-soft);margin-bottom:16px;\">Sessions<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <a href=\"#paths\" style=\"color:#D9DEDA;text-decoration:none;font-size:15px;\" style-hover=\"color:#FBF8F1;\">Group classes<\u002Fa>\n            <a href=\"#paths\" style=\"color:#D9DEDA;text-decoration:none;font-size:15px;\" style-hover=\"color:#FBF8F1;\">Private 1:1 sessions<\u002Fa>\n            <a href=\"#book\" style=\"color:#D9DEDA;text-decoration:none;font-size:15px;\" style-hover=\"color:#FBF8F1;\">Book a session<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px;font-weight:500;letter-spacing:.04em;color:var(--clay-soft);margin-bottom:16px;\">In association with<\u002Fdiv>\n          <a href=\"https://illuminations.ae\" target=\"_blank\" rel=\"noopener\" style=\"color:#FBF8F1;text-decoration:none;font-family:'Cormorant Upright',serif;font-size:19px;display:inline-block;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.25);padding-bottom:2px;\">Illuminations<\u002Fa>\n          <p style=\"font-size:14px;color:rgba(217,222,218,.7);margin:6px 0 0;line-height:1.5;\">Dubai's premier wellness centre · illuminations.ae<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,.14);margin-top:48px;padding-top:24px;display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;\">\n        <p style=\"font-size:13px;color:rgba(217,222,218,.58);margin:0;max-width:62ch;\">Self-hypnosis is a tool for self-regulation, not a replacement for medical or psychological treatment.<\u002Fp>\n        <p style=\"font-size:13px;color:rgba(217,222,218,.58);margin:0;\">© 2026 Soniyaa Kiran Punjabi<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { submitted: false, name: '' };\n\n  constructor(props){\n    super(props);\n    this._revealed = new Set();\n    this._io = null;\n    this._setRoot = (el) => { this._root = el; };\n  }\n\n  componentDidMount(){ this._initReveal(); }\n  componentDidUpdate(){ this._reapply(); this._initReveal(); }\n\n  _reduced(){\n    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  }\n\n  _initReveal(){\n    const root = this._root;\n    if(!root) return;\n    const nodes = root.querySelectorAll('[data-reveal]');\n    if(this._reduced()){\n      nodes.forEach(n => { n.style.opacity = '1'; n.style.transform = 'none'; });\n      return;\n    }\n    if(!this._io){\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if(e.isIntersecting){\n            const n = e.target;\n            n.style.opacity = '1';\n            n.style.transform = 'translateY(0)';\n            this._revealed.add(n);\n            this._io.unobserve(n);\n          }\n        });\n      }, { threshold: 0.1, rootMargin: '0px 0px -7% 0px' });\n    }\n    nodes.forEach(n => {\n      if(this._revealed.has(n)) return;\n      if(!n.dataset.revealInit){\n        n.dataset.revealInit = '1';\n        n.style.opacity = '0';\n        n.style.transform = 'translateY(20px)';\n        n.style.transition = 'opacity 0.7s cubic-bezier(0.2,0.6,0.2,1), transform 0.7s cubic-bezier(0.2,0.6,0.2,1)';\n        n.style.willChange = 'opacity, transform';\n      }\n      this._io.observe(n);\n    });\n  }\n\n  _reapply(){\n    // After a re-render React resets inline styles; restore revealed nodes instantly.\n    this._revealed.forEach(n => {\n      if(n.isConnected){ n.style.opacity = '1'; n.style.transform = 'translateY(0)'; }\n    });\n  }\n\n  _submit = (e) => {\n    e.preventDefault();\n    const form = e.currentTarget;\n    if(typeof form.checkValidity === 'function' && !form.checkValidity()){\n      form.reportValidity();\n      return;\n    }\n    const data = new FormData(form);\n    const name = (data.get('name') || '').toString().trim();\n    this.setState({ submitted: true, name });\n  };\n\n  renderVals(){\n    const first = this.state.name ? this.state.name.split(/\\s+/)[0] : '';\n    return {\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      greeting: first ? ('Thank you, ' + first + '.') : 'Thank you.',\n      setRoot: this._setRoot,\n      onSubmit: this._submit,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
